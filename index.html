<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="CAPO 12u Gold">
<link rel="apple-touch-icon" href="icon.png">
<title>CAPO 12u Gold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;600;700&family=Archivo:wght@600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: dark;
  --bg:#0e1116; --surface:#151a21; --surface2:#1b212a; --line:#283039;
  --line-strong:#3a4452; --text:#eef1f4; --muted:#9aa3b0; --faint:#7c8693;
  --gold:#f5c64a; --gold-dim:#b9933200; --pos:#5fc28a; --neg:#e0736b;
  --highlight:rgba(245,198,74,.10); --sortbg:rgba(245,198,74,.07);
}
*{box-sizing:border-box}
html{background:var(--bg)}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);
  font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%}
/* form controls inherit the dark scheme explicitly (iOS/Android can override) */
select,button,input{color-scheme:dark}
.wrap{max-width:1500px;margin:0 auto;padding:22px 20px 60px;background:var(--bg)}
/* ---- header ---- */
.masthead{display:flex;align-items:flex-end;justify-content:space-between;
  gap:20px;border-bottom:2px solid var(--gold);padding-bottom:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:16px}
.crest{width:54px;height:54px;border-radius:11px;flex:none;
  background:linear-gradient(150deg,#1d242e,#0e1116);border:1px solid var(--line-strong);
  display:grid;place-items:center;font-family:'Archivo';font-weight:800;font-size:21px;
  color:var(--gold);letter-spacing:-1px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.brand h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:0;line-height:1}
.brand .sub{color:var(--muted);font-size:12.5px;margin-top:5px;letter-spacing:.2px}
.teampick{position:relative}
.teamBtn{appearance:none;border:0;background:transparent;color:var(--text);cursor:pointer;
  font-family:'Archivo';font-weight:800;font-size:24px;letter-spacing:-.5px;line-height:1;
  display:inline-flex;align-items:center;gap:9px;padding:0}
.teamBtn .caret{color:var(--gold);font-size:15px;transform:translateY(1px)}
.teamBtn:hover{color:var(--gold)}
.teammenu{position:absolute;top:calc(100% + 10px);left:0;z-index:30;display:none;
  min-width:240px;background:var(--surface);border:1px solid var(--line-strong);
  border-radius:12px;padding:6px;box-shadow:0 18px 50px rgba(0,0,0,.55)}
.teammenu.open{display:block}
.teammenu .item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  cursor:pointer;font-family:'Archivo Narrow';font-weight:600;font-size:15px;color:var(--text)}
.teammenu .item:hover{background:var(--surface2)}
.teammenu .item.on{color:var(--gold)}
.teammenu .item .dot{width:22px;height:22px;border-radius:6px;flex:none;display:grid;
  place-items:center;background:linear-gradient(150deg,#1d242e,#0e1116);
  border:1px solid var(--line-strong);color:var(--gold);font-size:10px;font-weight:800}
.teammenu .sep{height:1px;background:var(--line);margin:6px 4px}
.teammenu .up{color:var(--gold)}
.teammenu .up .dot{color:var(--gold);border-style:dashed}
.summary{display:flex;gap:26px;text-align:right}
.summary .k{font-family:'Spline Sans Mono';font-weight:600;font-size:22px;line-height:1}
.summary .l{color:var(--faint);font-size:10.5px;text-transform:uppercase;
  letter-spacing:1.4px;margin-top:5px}
.summary .k.win{color:var(--gold)}
/* ---- controls ---- */
.controls{display:flex;flex-wrap:wrap;gap:14px 26px;align-items:center;
  margin:18px 0 6px}
.cluster{display:flex;align-items:center;gap:8px}
.cluster>.lab{color:var(--faint);font-size:10.5px;text-transform:uppercase;
  letter-spacing:1.4px;margin-right:2px}
.seg{display:inline-flex;background:var(--surface);border:1px solid var(--line);
  border-radius:9px;padding:3px}
.seg button{appearance:none;border:0;background:transparent;color:var(--muted);
  font-family:'Archivo Narrow';font-weight:600;font-size:13.5px;letter-spacing:.3px;
  padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s}
.seg button:hover{color:var(--text)}
.seg button.on{background:var(--gold);color:#1a1205}
.gamebtn{appearance:none;cursor:pointer;background:var(--surface);
  border:1px solid var(--line);color:var(--text);border-radius:9px;
  font-family:'Archivo Narrow';font-weight:600;font-size:13.5px;padding:8px 13px;
  display:inline-flex;align-items:center;gap:8px}
.gamebtn .cnt{font-family:'Spline Sans Mono';color:var(--gold);font-size:12px}
.gamebtn:hover{border-color:var(--line-strong)}
/* ---- game picker panel ---- */
.panel{display:none;margin:10px 0 4px;background:var(--surface);
  border:1px solid var(--line);border-radius:12px;padding:14px}
.panel.open{display:block}
.panel .ptools{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.panel .ptools button{appearance:none;cursor:pointer;background:var(--surface2);
  border:1px solid var(--line);color:var(--muted);border-radius:7px;
  font-family:'Archivo Narrow';font-weight:600;font-size:12px;padding:6px 11px}
.panel .ptools button:hover{color:var(--text);border-color:var(--line-strong)}
.gamegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:7px}
.gchip{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
  border:1px solid var(--line);background:var(--surface2);cursor:pointer;transition:.12s}
.gchip:hover{border-color:var(--line-strong)}
.gchip.on{border-color:var(--gold);background:rgba(245,198,74,.07)}
.gchip .box{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--faint);
  flex:none;display:grid;place-items:center}
.gchip.on .box{background:var(--gold);border-color:var(--gold)}
.gchip.on .box::after{content:"✓";color:#1a1205;font-size:11px;font-weight:800}
.gchip .gmeta{min-width:0}
.gchip .gop{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;font-family:'Archivo Narrow'}
.gchip .gdt{font-size:10.5px;color:var(--faint);font-family:'Spline Sans Mono';margin-top:2px}
.gchip .res{margin-left:auto;font-family:'Spline Sans Mono';font-size:11px;flex:none}
.res.w{color:var(--pos)} .res.l{color:var(--neg)} .res.t{color:var(--muted)}
.gseason{grid-column:1/-1;color:var(--faint);font-size:10.5px;text-transform:uppercase;
  letter-spacing:1.5px;margin:8px 0 2px;font-weight:700}
/* ---- tabs ---- */
.tabs{display:flex;gap:2px;margin:18px 0 0;border-bottom:1px solid var(--line)}
.tab{appearance:none;border:0;background:transparent;color:var(--muted);cursor:pointer;
  font-family:'Archivo';font-weight:700;font-size:14px;letter-spacing:.2px;
  padding:11px 18px;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.on{color:var(--gold);border-color:var(--gold)}
/* ---- table ---- */
.tablewrap{overflow:auto;border:1px solid var(--line);border-top:0;
  border-radius:0 0 12px 12px;max-height:none;background:var(--bg)}
table{border-collapse:separate;border-spacing:0;width:100%;min-width:max-content;background:var(--bg)}
thead th{position:sticky;top:0;z-index:3;background:var(--surface2);
  font-family:'Archivo Narrow';font-weight:700;font-size:11.5px;letter-spacing:.4px;
  color:var(--muted);text-transform:uppercase;padding:11px 9px;text-align:right;
  white-space:nowrap;cursor:pointer;border-bottom:1px solid var(--line-strong);
  user-select:none}
thead th:hover{color:var(--text)}
thead th .ar{color:var(--gold);font-size:9px;margin-left:3px;opacity:0}
thead th.sorted .ar{opacity:1}
thead th.sorted{color:var(--gold)}
th.player,td.player{position:sticky;left:0;z-index:2;text-align:left;
  background:var(--surface);min-width:172px}
thead th.player{z-index:4;background:var(--surface2)}
tbody td{font-family:'Spline Sans Mono';font-weight:400;font-size:13px;
  padding:9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line);
  color:#d7dce2;font-variant-numeric:tabular-nums;background:var(--bg)}
tbody td.player{font-family:'Archivo Narrow';font-weight:600;font-size:13.5px;color:var(--text)}
td.player.clickable{cursor:pointer}
td.player.clickable::after{content:"›";color:var(--faint);margin-left:8px;font-weight:700}
td.player.clickable:hover{color:var(--gold)}
td.player.clickable:hover::after{color:var(--gold)}
tbody tr:hover td{background:var(--highlight)}
tbody tr:hover td.player{background:#1c232c}
td.sorted,th.sorted{background:var(--sortbg)}
tbody tr:hover td.sorted{background:rgba(245,198,74,.16)}
.jersey{display:inline-block;min-width:20px;color:var(--gold);font-family:'Spline Sans Mono';
  font-size:11px;margin-right:8px}
tbody tr.team td{border-top:2px solid var(--line-strong);background:#11161d;
  font-weight:600;color:#fff}
tbody tr.team td.player{background:#11161d;color:var(--gold)}
tbody tr.team:hover td{background:#141b23}
.lead{color:var(--gold)}
.muted-cell{color:var(--faint)}
/* ---- spray ---- */
.spray{padding:22px;border:1px solid var(--line);border-top:0;border-radius:0 0 12px 12px;
  display:none;background:var(--bg)}
.spray.on{display:block}
.sprayhead{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.sprayhead select{background:var(--surface);border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:8px 12px;font-family:'Archivo Narrow';font-weight:600;font-size:13.5px}
.fieldgrid{display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:26px;align-items:start}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--muted)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
.bbtable{width:100%;border-collapse:separate;border-spacing:0}
.bbtable th{font-family:'Archivo Narrow';text-transform:uppercase;letter-spacing:.4px;
  color:var(--muted);font-size:11px;text-align:right;padding:8px 10px;border-bottom:1px solid var(--line)}
.bbtable th:first-child{text-align:left}
.bbtable td{font-family:'Spline Sans Mono';font-size:13px;padding:8px 10px;text-align:right;
  border-bottom:1px solid var(--line)}
.bbtable td:first-child{text-align:left;font-family:'Archivo Narrow';font-weight:600}
.bar{height:7px;border-radius:4px;background:var(--gold);display:inline-block;vertical-align:middle}
/* ---- footnote ---- */
.notebtn{appearance:none;cursor:pointer;background:var(--surface);border:1px solid var(--line);
  color:var(--muted);border-radius:8px;font-family:'Archivo Narrow';font-weight:600;font-size:12.5px;
  padding:8px 13px;margin-top:20px;display:inline-flex;align-items:center;gap:8px}
.notebtn:hover{color:var(--text);border-color:var(--line-strong)}
.notebtn .chev{color:var(--gold);font-size:10px;transition:transform .15s}
.notebtn.open .chev{transform:rotate(180deg)}
.note{display:none;margin-top:10px;color:var(--muted);font-size:12px;line-height:1.6;
  background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--gold);
  border-radius:8px;padding:13px 16px}
.note.open{display:block}
.note b{color:var(--text);font-weight:700}
.scrollhint{color:var(--faint);font-size:11px;margin:8px 2px 0;font-family:'Archivo Narrow'}
@media(max-width:760px){
  .wrap{padding:calc(16px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 48px calc(12px + env(safe-area-inset-left))}
  .masthead{align-items:flex-start;gap:12px}
  .brand h1{font-size:19px}
  .brand .sub{font-size:11.5px}
  .crest{width:44px;height:44px;font-size:17px}
  .summary{width:100%;justify-content:flex-start;text-align:left;gap:18px;flex-wrap:wrap}
  .summary .k{font-size:18px}
  .controls{gap:12px 18px}
  .fieldgrid{grid-template-columns:1fr;gap:18px}
  .gamegrid{grid-template-columns:1fr}
  .tab{padding:11px 14px;font-size:13.5px}
  .sprayhead select{flex:1;min-width:0}
  .note{font-size:12px}
}
@media(max-width:430px){
  .summary{gap:14px}
  .summary .k{font-size:16px}
  .seg button{padding:7px 11px;font-size:13px}
  tbody td{font-size:12.5px;padding:8px 7px}
  th.player,td.player{min-width:140px}
  .tabs{overflow-x:auto}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="brand">
      <div class="crest" id="crest">CG</div>
      <div>
        <div class="teampick">
          <button class="teamBtn" id="teamBtn"><span id="teamName">CAPO 12u Gold</span><span class="caret">&#9662;</span></button>
          <div class="teammenu" id="teamMenu"></div>
        </div>
        <div class="sub" id="sub">play-by-play, reconstructed &amp; box-score verified</div>
      </div>
    </div>
    <div class="summary" id="summary"></div>
  </div>
  <input type="file" id="teamFile" accept="application/json,.json" style="display:none">

  <div class="controls">
    <div class="cluster"><span class="lab">Season</span>
      <div class="seg" id="seasonSeg"></div>
    </div>
    <div class="cluster"><span class="lab">Side</span>
      <div class="seg" id="sideSeg">
        <button data-side="rt" class="on">Our team</button>
        <button data-side="vs">Opponents</button>
      </div>
    </div>
    <div class="cluster"><span class="lab">Games</span>
      <button class="gamebtn" id="gameToggle">Pick games <span class="cnt" id="gameCount"></span></button>
    </div>
  </div>

  <div class="panel" id="gamePanel">
    <div class="ptools" id="ptools"></div>
    <div class="gamegrid" id="gameGrid"></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab on" data-t="standard">Standard</button>
    <button class="tab" data-t="advanced">Advanced</button>
    <button class="tab" data-t="spray">Spray &amp; Contact</button>
  </div>

  <div class="tablewrap" id="tableHost"><table id="tbl"><thead></thead><tbody></tbody></table></div>

  <div class="spray" id="sprayHost">
    <div class="sprayhead">
      <span class="lab" id="sprayLabel" style="color:var(--faint);font-size:10.5px;text-transform:uppercase;letter-spacing:1.4px">Batter</span>
      <select id="sprayPlayer"></select>
      <span id="sprayMeta" style="color:var(--muted);font-size:12.5px"></span>
    </div>
    <div class="fieldgrid">
      <div>
        <svg id="field" viewBox="0 0 400 380" style="width:100%;height:auto"></svg>
        <div class="legend" id="sprayLegend">
          <span><i style="background:var(--gold)"></i><span id="legHit">Hits</span></span>
          <span><i style="background:#5b6470"></i><span id="legOut">Outs / reached</span></span>
          <span style="color:var(--faint)">Bubble size = balls hit to that fielder</span>
        </div>
      </div>
      <div>
        <table class="bbtable" id="bbtable"></table>
      </div>
    </div>
  </div>

  <button class="notebtn" id="noteBtn">&#9432; How this was built <span class="chev">&#9662;</span></button>
  <div class="note" id="note"></div>
  <div class="scrollhint">Tip: tap any column header to sort. Scroll the table sideways to see every stat. The player column stays pinned.</div>
</div>

2026 Summer","cat":"GO","bbtype":"BUNT","loc":"P","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#24","game":"m11","season":"2026 Summer","cat":"PO","bbtype":"FB","loc":"CF","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#24","game":"m11","season":"2026 Summer","cat":"PO","bbtype":"LD","loc":"3B","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#6","game":"m11","season":"2026 Summer","cat":"2B","bbtype":"FB","loc":"RF","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#21","game":"m12","season":"2026 Summer","cat":"PO","bbtype":"FB","loc":"RCF","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#30","game":"m12","season":"2026 Summer","cat":"2B","bbtype":"PU","loc":"C","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#30","game":"m12","season":"2026 Summer","cat":"FO","bbtype":"LD","loc":"RCF","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#30","game":"m12","season":"2026 Summer","cat":"2B","bbtype":"LD","loc":"RF","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#11","game":"m12","season":"2026 Summer","cat":"1B","bbtype":"GB","loc":"C","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#11","game":"m12","season":"2026 Summer","cat":"2B","bbtype":"PU","loc":"C","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#17","game":"m12","season":"2026 Summer","cat":"PO","bbtype":"LD","loc":"RF","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#17","game":"m12","season":"2026 Summer","cat":"2B","bbtype":"FB","loc":"RCF","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#17","game":"m12","season":"2026 Summer","cat":"LO","bbtype":"GB","loc":"C","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#14","game":"m12","season":"2026 Summer","cat":"GO","bbtype":"BUNT","loc":"C","hard":false,"pitcher":"Ivy Chen","pitcher_j":"4"},{"batter":"#14","game":"m12","season":"2026 Summer","cat":"2B","bbtype":"GB","loc":"SS","hard <script>
const TEAMS = JSON.parse(document.getElementById('data').textContent);  // {id:{name,data}}
let currentTeam=null, DATA=null, GAMES=null, byFile=null, KEYS=null;
const state = {season:'all', side:'rt', tab:'standard',
  selected:new Set(), sort:{standard:'PA',advanced:'PA',spray:null}, dir:-1,
  sprayTarget:null, sprayReset:null};

/* ---------- aggregation + rate math (mirrors the Python finalize) ---------- */
function aggregate(side){
  const src = side==='rt'? DATA.team_per_game : DATA.opp_per_game;
  const out = {};
  for(const f of state.selected){
    const pg = src[f]; if(!pg) continue;
    for(const [name,s] of Object.entries(pg)){
      if(!out[name]){out[name]={};KEYS.forEach(k=>out[name][k]=0);out[name]._name=name;}
      KEYS.forEach(k=>out[name][k]+=(s[k]||0));
    }
  }
  return out;
}
function finalize(s){
  const r=Object.assign({},s);
  const AB=s.AB,H=s.H,BB=s.BB,HBP=s.HBP,SF=s.SF,SO=s.SO,PA=s.PA;
  r.AVG=AB?H/AB:0;
  r.OBP=(AB+BB+HBP+SF)?(H+BB+HBP)/(AB+BB+HBP+SF):0;
  r.SLG=AB?s.TB/AB:0; r.OPS=r.OBP+r.SLG;
  r.QABp=PA?s.QAB/PA*100:0;
  r.PABB=BB?PA/BB:null;
  r.BBK=SO?BB/SO:(BB?null:0);
  r.Cp=s.swings?s.con_swings/s.swings*100:0;
  const bb=s.GB+s.FB+s.LD+s.PU;
  r.LDp=bb?s.LD/bb*100:0; r.FBp=bb?(s.FB+s.PU)/bb*100:0; r.GBp=bb?s.GB/bb*100:0;
  const bd=AB-SO-s.HR+SF; r.BABIP=bd?(H-s.HR)/bd:0;
  r.BARISP=s.RISP_AB?s.RISP_H/s.RISP_AB:0;
  r.PSPA=PA?s.PS/PA:0; r.TS3p=PA?s.TwoStrPlus3/PA*100:0;
  r.OBE=PA?(s.H+s.ROE+s.FC+s.SAC+s.SF)/PA:0;   // REACH = (H+ROE+FC+SAC+SF)/PA
  r.RPp=PA?(s.R+s.RBI)/PA*100:0;                // RP%  = (R+RBI)/PA
  r.Kp=PA?s.SO/PA*100:0;                        // K%   = SO/PA
  return r;
}
/* number formatting helpers */
const av=v=>(v===null||isNaN(v))?'—':(v<1?v.toFixed(3).replace(/^0/,''):v.toFixed(3));
const p2=v=>(v===null||isNaN(v))?'—':v.toFixed(2);
const p1=v=>(v===null||isNaN(v))?'—':v.toFixed(1);
const r3=v=>(v===null||isNaN(v))?'—':v.toFixed(3);
const ratio3=v=>(v===null)?'—':(v<1?v.toFixed(3).replace(/^0/,''):v.toFixed(3));

/* column definitions: [label, key, formatter, higherIsBetter] */
const COLS={
 standard:[['GP','GP',v=>v,0],['PA','PA',v=>v,0],['AB','AB',v=>v,0],
  ['AVG','AVG',av,1],['OBP','OBP',av,1],['OPS','OPS',r3,1],['SLG','SLG',av,1],
  ['H','H',v=>v,1],['1B','1B',v=>v,0],['2B','2B',v=>v,1],['3B','3B',v=>v,1],
  ['HR','HR',v=>v,1],['RBI','RBI',v=>v,1],['R','R',v=>v,1],['BB','BB',v=>v,1],
  ['SO','SO',v=>v,0],['K-L','K_L',v=>v,0],['HBP','HBP',v=>v,0],['SAC','SAC',v=>v,1],
  ['SF','SF',v=>v,1],['ROE','ROE',v=>v,0],['FC','FC',v=>v,0],
  ['REACH','OBE',av,1],['RP%','RPp',p1,1],['K%','Kp',p1,0]],
 advanced:[['GP','GP',v=>v,0],['PA','PA',v=>v,0],['AB','AB',v=>v,0],
  ['QAB','QAB',v=>v,1],['QAB%','QABp',p2,1],['PA/BB','PABB',p1,1],['BB/K','BBK',ratio3,1],
  ['C%','Cp',p2,1],['HHB','HHB',v=>v,1],['LD%','LDp',p2,1],['FB%','FBp',p2,0],
  ['GB%','GBp',p2,0],['BABIP','BABIP',av,1],['BA/RISP','BARISP',av,1],['LOB','LOB',v=>v,0],
  ['2OUTRBI','TwoOutRBI',v=>v,1],['XBH','XBH',v=>v,1],['TB','TB',v=>v,1],['PS','PS',v=>v,0],
  ['PS/PA','PSPA',r3,1],['2S+3','TwoStrPlus3',v=>v,1],['2S+3%','TS3p',p2,1]]
};
const APPROX=new Set(['QAB','QABp','Cp','HHB','BARISP','LOB','TwoStrPlus3','TS3p']);

/* ---------- rendering ---------- */
function jerseyOf(name){const r=DATA.roster.find(r=>r.name===name);return r?r.jersey:'';}
function render(){
  document.getElementById('gameCount').textContent=state.selected.size+'/'+GAMES.length;
  renderSummary();
  if(state.tab==='spray'){document.getElementById('tableHost').style.display='none';
    document.getElementById('sprayHost').classList.add('on');renderSpray();return;}
  document.getElementById('tableHost').style.display='';
  document.getElementById('sprayHost').classList.remove('on');
  const cols=COLS[state.tab];
  const agg=aggregate(state.side);
  let rows=Object.values(agg).filter(r=>r.PA>0).map(finalize);
  // sort
  const sk=state.sort[state.tab]||'PA';
  rows.sort((a,b)=>{const x=a[sk],y=b[sk];
    if(x===null)return 1;if(y===null)return -1;
    return state.dir*((y>x?1:y<x?-1:0));});
  // team totals
  const team={};KEYS.forEach(k=>team[k]=0);
  rows.forEach(r=>KEYS.forEach(k=>team[k]+=(r[k]||0)));
  const teamF=finalize(team);
  // column leaders (our team only, min 10 PA) for gold highlight
  const leaders={};
  if(state.side==='rt'){cols.forEach(([lab,key,fmt,hib])=>{if(!hib)return;
    let best=-Infinity,who=null;rows.forEach(r=>{if(r.PA>=10&&r[key]!=null&&r[key]>best){best=r[key];who=r._name;}});
    leaders[key]=who;});}
  // head
  const thead=document.querySelector('#tbl thead');
  thead.innerHTML='<tr><th class="player" data-k="_name">Batter</th>'+
    cols.map(([lab,key])=>`<th data-k="${key}" class="${key===sk?'sorted':''}">${lab}<span class="ar">${state.dir<0?'▼':'▲'}</span></th>`).join('')+'</tr>';
  thead.querySelectorAll('th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k; if(k==='_name')return;
    if(state.sort[state.tab]===k)state.dir*=-1;else{state.sort[state.tab]=k;state.dir=-1;}
    render();});
  // body
  const tb=document.querySelector('#tbl tbody');
  const mkrow=(r,isTeam)=>{
    const nm=isTeam?'Team':`<span class="jersey">${r.jersey!=null&&jerseyOf(r._name)!==''?'#'+jerseyOf(r._name):''}</span>${r._name}`;
    const clickable=(!isTeam&&state.side==='rt');
    const plCell=`<td class="player${clickable?' clickable':''}"${clickable?` data-pl="${r._name}"`:''}>${nm}</td>`;
    return `<tr class="${isTeam?'team':''}">`+plCell+
     cols.map(([lab,key,fmt])=>{
       let v=r[key];let cls=(key===sk?'sorted':'');
       let disp=fmt(v);
       if(!isTeam&&leaders[key]&&leaders[key]===r._name)cls+=' lead';
       if(disp==='0'||disp==='—'||disp==='.000')cls+=' muted-cell';
       return `<td class="${cls}">${disp}</td>`;}).join('')+'</tr>';};
  tb.innerHTML=rows.map(r=>mkrow(r,false)).join('')+ (state.side==='rt'?mkrow(teamF,true):'');
  tb.querySelectorAll('td.player.clickable[data-pl]').forEach(td=>
    td.onclick=()=>goToPlayerSpray(td.dataset.pl));
}
function goToPlayerSpray(name){
  state.sprayTarget=name;
  if(state.side!=='rt'){state.side='rt';
    document.querySelectorAll('#sideSeg button').forEach(x=>x.classList.toggle('on',x.dataset.side==='rt'));}
  state.tab='spray';
  document.querySelectorAll('#tabs .tab').forEach(x=>x.classList.toggle('on',x.dataset.t==='spray'));
  render();
  document.getElementById('sprayHost').scrollIntoView({behavior:'smooth',block:'start'});
}
function renderSummary(){
  const agg=aggregate('rt');
  let g=new Set();let w=0,l=0,t=0;
  state.selected.forEach(f=>{g.add(f);const m=byFile[f];
    if(m.result==='W')w++;else if(m.result==='L')l++;else t++;});
  const team={};KEYS.forEach(k=>team[k]=0);
  Object.values(agg).forEach(r=>KEYS.forEach(k=>team[k]+=(r[k]||0)));
  const f=finalize(team);
  document.getElementById('summary').innerHTML=
    `<div><div class="k">${g.size}</div><div class="l">Games</div></div>`+
    `<div><div class="k">${w}-${l}${t?'-'+t:''}</div><div class="l">Record</div></div>`+
    `<div><div class="k win">${av(f.AVG)}</div><div class="l">Team AVG</div></div>`+
    `<div><div class="k">${r3(f.OPS)}</div><div class="l">Team OPS</div></div>`+
    `<div><div class="k">${team.R}</div><div class="l">Runs</div></div>`;
}

/* ---------- spray / contact ---------- */
const FIELD_XY={ // approx positions on a 400x380 field svg
 'P':[200,250],'C':[200,335],'1B':[268,232],'2B':[238,178],'SS':[162,178],
 '3B':[132,232],'LF':[95,110],'CF':[200,70],'RF':[305,110],'LCF':[150,85],'RCF':[250,85]};
function renderSpray(){
  const side=state.side;                 // 'rt' = our hitters, 'vs' = opponent hits vs us
  const sel=document.getElementById('sprayPlayer');
  // (re)build the dropdown when the mode changes
  if(sel.dataset.mode!==side){
    sel.dataset.mode=side;
    if(side==='rt'){
      document.getElementById('sprayLabel').textContent='Batter';
      const names=DATA.roster.map(r=>r.name);
      sel.innerHTML='<option value="__ALL__">Whole team</option>'+
        names.map(n=>`<option value="${n}">#${jerseyOf(n)} ${n}</option>`).join('');
    }else{
      document.getElementById('sprayLabel').textContent='Pitching';
      // distinct pitchers from opponent batted-ball records, by usage
      const cnt={};(DATA.opp_bip||[]).forEach(b=>{cnt[b.pitcher]=(cnt[b.pitcher]||0)+1;});
      const pitchers=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]);
      sel.innerHTML='<option value="__ALL__">All pitchers</option>'+
        pitchers.map(p=>{const j=pitcherJersey(p);return `<option value="${p}">${j?'#'+j+' ':''}${p}</option>`;}).join('');
    }
    sel.onchange=renderSpray;
  }
  // a player tapped in a table jumps here pre-filtered to that batter
  if(state.sprayTarget && side==='rt'){
    sel.value=state.sprayTarget; state.sprayTarget=null;
  } else if(state.sprayReset){
    sel.value='__ALL__'; state.sprayReset=null;
  }
  const who=sel.value||'__ALL__';
  const HITS=new Set(['1B','2B','3B','HR']);
  let recs;
  if(side==='rt'){
    recs=DATA.bip.filter(b=>state.selected.has(b.game)&&(who==='__ALL__'||b.player===who));
    document.getElementById('legHit').textContent='Hits';
    document.getElementById('legOut').textContent='Outs / reached';
  }else{
    recs=(DATA.opp_bip||[]).filter(b=>state.selected.has(b.game)&&(who==='__ALL__'||b.pitcher===who));
    document.getElementById('legHit').textContent='Hits allowed';
    document.getElementById('legOut').textContent='Outs recorded';
  }
  // aggregate by location
  const byLoc={};recs.forEach(b=>{if(!b.loc)return;
    byLoc[b.loc]=byLoc[b.loc]||{n:0,h:0};byLoc[b.loc].n++;if(HITS.has(b.cat))byLoc[b.loc].h++;});
  const maxN=Math.max(1,...Object.values(byLoc).map(o=>o.n));
  // field svg
  const svg=document.getElementById('field');
  let s=`<defs></defs>
   <rect x="0" y="0" width="400" height="380" fill="transparent"/>
   <path d="M200 335 L330 200 A185 185 0 0 0 70 200 Z" fill="#141a21" stroke="#283039"/>
   <path d="M200 335 L268 268 A96 96 0 0 0 132 268 Z" fill="#171f28" stroke="#283039"/>
   <path d="M200 335 L243 292 A60 60 0 0 0 157 292 Z" fill="#1b2530" stroke="#2f3a45"/>
   <line x1="200" y1="335" x2="92" y2="200" stroke="#3a4452"/>
   <line x1="200" y1="335" x2="308" y2="200" stroke="#3a4452"/>`;
  for(const [loc,xy] of Object.entries(FIELD_XY)){
    const o=byLoc[loc];if(!o)continue;
    const rad=7+18*(o.n/maxN);
    const ha=o.h/o.n;
    s+=`<circle cx="${xy[0]}" cy="${xy[1]}" r="${rad}" fill="rgba(245,198,74,${.18+.5*ha})"
        stroke="${ha>=.5?'#f5c64a':'#5b6470'}" stroke-width="1.5"/>
        <text x="${xy[0]}" y="${xy[1]+4}" text-anchor="middle" font-family="Spline Sans Mono"
        font-size="11" fill="#eef1f4">${o.n}</text>`;
  }
  svg.innerHTML=s;
  // batted-ball type table
  const types={GB:0,LD:0,FB:0,PU:0,BUNT:0};let hard=0,tot=0;
  recs.forEach(b=>{if(b.bbtype&&types[b.bbtype]!=null){types[b.bbtype]++;}if(b.hard)hard++;tot++;});
  const tt=Object.values(types).reduce((a,b)=>a+b,0)||1;
  const lab={GB:'Ground balls',LD:'Line drives',FB:'Fly balls',PU:'Pop-ups',BUNT:'Bunts'};
  const hdr=side==='rt'?'Batted-ball type':'Contact allowed';
  let rowsH=`<tr><th>${hdr}</th><th>#</th><th>%</th><th style="width:120px"></th></tr>`;
  for(const k of ['LD','FB','GB','PU','BUNT']){const n=types[k];const pc=n/tt*100;
    rowsH+=`<tr><td>${lab[k]}</td><td>${n}</td><td>${pc.toFixed(1)}</td>
      <td><span class="bar" style="width:${Math.round(pc)}%"></span></td></tr>`;}
  rowsH+=`<tr><td>Hard-hit</td><td>${hard}</td><td>${(hard/(tot||1)*100).toFixed(1)}</td><td></td></tr>`;
  document.getElementById('bbtable').innerHTML=rowsH;
  const hitsN=recs.filter(b=>HITS.has(b.cat)).length;
  document.getElementById('sprayMeta').textContent= side==='rt'
    ? `${recs.length} batted balls in selected games · ${hitsN} hits`
    : `${recs.length} balls in play allowed${who==='__ALL__'?'':' with '+who+' pitching'} · ${hitsN} hits allowed`;
}
function pitcherJersey(name){
  const r=DATA.roster.find(r=>r.name===name);return r?r.jersey:'';
}

/* ---------- season control (dynamic per team) ---------- */
function seasonsOf(){return [...new Set(GAMES.map(g=>g.season))];}
function buildSeasonSeg(){
  const seg=document.getElementById('seasonSeg');const seasons=seasonsOf();
  let h=`<button data-s="all" class="${state.season==='all'?'on':''}">All ${GAMES.length}</button>`;
  if(seasons.length>1) h+=seasons.map(s=>`<button data-s="${s}" class="${state.season===s?'on':''}">${s}</button>`).join('');
  seg.innerHTML=h;
  seg.querySelectorAll('button').forEach(b=>b.onclick=()=>setSeason(b.dataset.s));
}
function setSeason(s){state.season=s;
  if(s==='all')state.selected=new Set(GAMES.map(g=>g.file));
  else state.selected=new Set(GAMES.filter(g=>g.season===s).map(g=>g.file));
  syncSeasonSeg();buildGameGrid();render();}
function syncSeasonSeg(){document.querySelectorAll('#seasonSeg button').forEach(b=>
  b.classList.toggle('on',b.dataset.s===state.season));}
function buildPtools(){
  const seasons=seasonsOf();
  let h='<button data-p="all">Select all</button><button data-p="none">Clear</button>';
  if(seasons.length>1) h+=seasons.map(s=>`<button data-p="${s}">Only ${s}</button>`).join('');
  const el=document.getElementById('ptools');el.innerHTML=h;
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const p=b.dataset.p;
    if(p==='all')state.selected=new Set(GAMES.map(g=>g.file));
    else if(p==='none')state.selected=new Set();
    else state.selected=new Set(GAMES.filter(g=>g.season===p).map(g=>g.file));
    state.season=(p==='all')?'all':(p==='none'?'custom':p);syncSeasonSeg();buildGameGrid();render();});
}
document.querySelectorAll('#sideSeg button').forEach(b=>b.onclick=()=>{
  state.side=b.dataset.side;document.querySelectorAll('#sideSeg button').forEach(x=>
    x.classList.toggle('on',x===b));render();});
document.querySelectorAll('#tabs .tab').forEach(b=>b.onclick=()=>{
  if(b.dataset.t==='spray') state.sprayReset=true;   // tapping the tab clears the spray filter
  state.tab=b.dataset.t;document.querySelectorAll('#tabs .tab').forEach(x=>
    x.classList.toggle('on',x===b));render();});
document.getElementById('gameToggle').onclick=()=>
  document.getElementById('gamePanel').classList.toggle('open');
function buildGameGrid(){
  const grid=document.getElementById('gameGrid');let h='';let cur='';
  const multi=seasonsOf().length>1;
  GAMES.forEach(g=>{
    if(multi && g.season!==cur){cur=g.season;h+=`<div class="gseason">${cur} season</div>`;}
    const on=state.selected.has(g.file);
    const rc=g.result==='W'?'w':g.result==='L'?'l':'t';
    h+=`<div class="gchip ${on?'on':''}" data-f="${g.file}">
      <span class="box"></span>
      <span class="gmeta"><span class="gop">G${g.idx} · ${(g.opponent||'').slice(0,26)}</span>
      <span class="gdt">${g.date||''} · ${g.rt_score}-${g.opp_score}</span></span>
      <span class="res ${rc}">${g.result||''}</span></div>`;});
  grid.innerHTML=h;
  grid.querySelectorAll('.gchip').forEach(ch=>ch.onclick=()=>{
    const f=ch.dataset.f;if(state.selected.has(f))state.selected.delete(f);else state.selected.add(f);
    state.season='custom';syncSeasonSeg();ch.classList.toggle('on');render();});
}
function buildNote(){
  const el=document.getElementById('note');
  const note=DATA.meta.note||'';
  if(/[Mm]ock|demonstration/.test(note)){
    el.innerHTML='<b>Demo team.</b> '+note+' Use the team menu at the top to switch teams or upload your own data.';
    return;}
  const hy=GAMES.filter(g=>g.season==='Hype').length, an=GAMES.filter(g=>g.season==='Anarchy').length;
  let body='<b>How this was built.</b> Every plate appearance was parsed from the GameChanger play-by-play and '+
    'cross-checked against the box scores game-by-game. ';
  if(hy||an) body+='All '+hy+' Hype games and '+an+' Anarchy games are included. '+
    'Standard counting stats match the GameChanger reference sheet for the original Hype games (a handful of bottom-order '+
    'plate appearances differ by 1\u20132 from minor segmentation gaps; the box scores confirm those figures). ';
  body+='Proprietary metrics (QAB, C%, HHB, BA/RISP, LOB, 2S+3) are calibrated approximations of GameChanger\u2019s '+
    'internal formulas and are marked accordingly.';
  el.innerHTML=body;
}

/* ---------- team picker + upload ---------- */
function initials(name){
  const words=name.split(/\s+/).filter(w=>/^[A-Za-z]/.test(w));
  if(words.length>=2) return (words[0][0]+words[1][0]).toUpperCase();
  return (name.replace(/[^A-Za-z]/g,'').slice(0,2)||'?').toUpperCase();
}
function buildTeamMenu(){
  const menu=document.getElementById('teamMenu');
  let h=Object.entries(TEAMS).map(([id,t])=>
    `<div class="item ${id===currentTeam?'on':''}" data-team="${id}"><span class="dot">${initials(t.name)}</span>${t.name}</div>`).join('');
  h+='<div class="sep"></div><div class="item up" data-up="1"><span class="dot">+</span>Upload team data\u2026</div>';
  menu.innerHTML=h;
  menu.querySelectorAll('[data-team]').forEach(it=>it.onclick=()=>{closeTeamMenu();loadTeam(it.dataset.team);});
  menu.querySelector('[data-up]').onclick=()=>{closeTeamMenu();document.getElementById('teamFile').click();};
}
function closeTeamMenu(){document.getElementById('teamMenu').classList.remove('open');}
document.getElementById('teamBtn').onclick=(e)=>{
  e.stopPropagation();buildTeamMenu();document.getElementById('teamMenu').classList.toggle('open');};
document.addEventListener('click',closeTeamMenu);
document.getElementById('teamMenu').onclick=(e)=>e.stopPropagation();

function loadTeam(id){
  currentTeam=id; DATA=TEAMS[id].data; GAMES=DATA.meta.games;
  byFile=Object.fromEntries(GAMES.map(g=>[g.file,g])); KEYS=DATA.keys;
  state.selected=new Set(GAMES.map(g=>g.file));
  state.season='all'; state.side='rt'; state.sprayTarget=null; state.sprayReset=null;
  document.getElementById('sprayPlayer').dataset.mode='';
  document.querySelectorAll('#sideSeg button').forEach(x=>x.classList.toggle('on',x.dataset.side==='rt'));
  document.getElementById('teamName').textContent=TEAMS[id].name;
  document.getElementById('crest').textContent=initials(TEAMS[id].name);
  document.getElementById('sub').textContent=seasonsOf().join(' + ')+' \u00b7 play-by-play';
  buildSeasonSeg();buildPtools();buildGameGrid();buildNote();render();
}
function addTeam(name,data){
  let id=(name||'team').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||('team'+Date.now());
  let base=id,n=2;while(TEAMS[id]){id=base+'-'+(n++);}
  TEAMS[id]={name,data};
  try{const s=JSON.parse(localStorage.getItem('cg_teams')||'{}');s[id]={name,data};
    localStorage.setItem('cg_teams',JSON.stringify(s));}catch(e){}
  return id;
}
document.getElementById('teamFile').onchange=(e)=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const j=JSON.parse(rd.result);let name,data;
      if(j&&j.data&&j.data.meta){name=j.name||j.data.meta.team;data=j.data;}
      else if(j&&j.meta&&j.team_per_game){name=j.meta.team;data=j;}
      else throw 0;
      if(!data.keys||!data.team_per_game||!data.roster||!data.meta) throw 0;
      loadTeam(addTeam(name||'New team',data));
    }catch(err){alert('That file doesn\u2019t look like a team data file. Upload JSON in the same format as this sheet\u2019s data export.');}
    e.target.value='';
  };
  rd.readAsText(f);
};
try{const s=JSON.parse(localStorage.getItem('cg_teams')||'{}');
  Object.entries(s).forEach(([id,t])=>{if(!TEAMS[id])TEAMS[id]=t;});}catch(e){}

document.getElementById('noteBtn').onclick=()=>{
  const n=document.getElementById('note'),btn=document.getElementById('noteBtn');
  btn.classList.toggle('open', n.classList.toggle('open'));
};

loadTeam(Object.keys(TEAMS)[0]);

</script>
</body>
